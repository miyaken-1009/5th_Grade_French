<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>仏語 穴埋め</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a2520">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="仏語 穴埋め">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@300;400;600&display=swap');
  :root {
    --bg:#f9f8f6; --surface:#f4f3f0; --card:#ffffff; --border:#e0ddd8;
    --accent:#2a2520; --accent-dim:#4a433c; --text:#1a1815; --text-dim:#3d3830; --text-muted:#8a8278;
    --red:#b03020; --green:#2a7848; --blue:#2a5a90; --orange:#b86820;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Serif JP', serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  header { width:100%; max-width:620px; padding:32px 24px 0; display:flex; align-items:baseline; gap:16px; }
  .logo { font-family:'Playfair Display', serif; font-size:20px; letter-spacing:0.04em; color:var(--accent); }
  .logo span { font-style:italic; }
  .day-tag { margin-left:auto; font-size:12px; color:var(--text-muted); letter-spacing:0.08em; }
  .day-tag b { color:var(--text-dim); }

  .progress-wrap { width:100%; max-width:620px; padding:16px 24px 0; }
  .progress-track { height:2px; background:var(--border); border-radius:1px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#4a433c,var(--accent)); transition:width .5s ease; }

  main { width:100%; max-width:620px; padding:36px 24px 60px; flex:1 0 auto; display:flex; flex-direction:column; align-items:center; }

  .day-info { text-align:center; width:100%; }
  .day-info .big { font-family:'Playfair Display', serif; font-size:52px; color:var(--accent); margin-bottom:6px; }
  .day-info h2 { font-size:16px; font-weight:400; color:var(--text-muted); margin-bottom:32px; }
  .quota-row { display:flex; gap:12px; margin-bottom:28px; }
  .quota-box { flex:1; border:1px solid var(--border); border-radius:4px; padding:18px 10px; background:var(--card); }
  .quota-box .n { font-family:'Playfair Display', serif; font-size:30px; color:var(--text); }
  .quota-box .l { font-size:10px; color:var(--text-muted); letter-spacing:0.1em; text-transform:uppercase; margin-top:4px; }
  .quota-note { font-size:11.5px; color:var(--text-muted); line-height:1.7; margin-bottom:26px; text-align:left; background:var(--surface); border:1px solid var(--border); padding:14px 16px; border-radius:4px; }
  .start-btn { width:100%; padding:16px; background:var(--accent); color:#fff; border:none; border-radius:4px; font-family:'Playfair Display', serif; font-size:16px; cursor:pointer; }
  .start-btn:hover { background:var(--accent-dim); }

  .level-badge { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; padding:4px 12px; border-radius:20px; margin-bottom:22px; border:1px solid; }
  .level-badge.new { color:var(--accent); border-color:rgba(42,37,32,0.25); background:rgba(42,37,32,0.04); }
  .level-badge.review { color:var(--blue); border-color:rgba(42,90,144,0.35); background:rgba(42,90,144,0.06); }

  .card { width:100%; background:var(--card); border:1px solid var(--border); border-radius:4px; padding:44px 40px 36px; position:relative; display:flex; flex-direction:column; }
  .card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:linear-gradient(180deg,var(--accent),transparent); border-radius:4px 0 0 4px; }
  
  .pos-tag { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; font-family:'Playfair Display', serif; font-style:italic; }
  .jp-sentence { font-size:22px; font-weight:300; color:var(--accent); line-height:1.6; margin-bottom:16px; letter-spacing:0.02em; }
  .fr-sentence { font-family:'Playfair Display', serif; font-size:22px; color:var(--text-dim); line-height:1.7; margin-bottom:32px; }
  .blank-slot { display:inline-block; min-width:90px; border-bottom:2px solid var(--accent); text-align:center; color:var(--text-muted); font-style:italic; padding:0 4px; }

  .input-row { display:flex; gap:8px; margin-bottom:14px; }
  .answer-input { flex:1; font-family:'Noto Serif JP', serif; font-size:16px; padding:12px 14px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--text); outline:none; transition:border-color .2s; }
  .answer-input:focus { border-color:var(--accent-dim); }
  .answer-input.correct { border-color:var(--green); background:rgba(42,120,72,0.06); }
  .answer-input.wrong { border-color:var(--red); background:rgba(176,48,32,0.06); }

  .hint-text { font-size:12px; color:var(--text-muted); margin-top:-4px; margin-bottom:14px; letter-spacing:0.04em; }

  .action-row { display:flex; gap:10px; margin-bottom:16px; }
  .hint-btn, .submit-btn, .next-action-btn { font-family:'Noto Serif JP', serif; font-size:13px; letter-spacing:0.05em; padding:12px 20px; border-radius:4px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-dim); transition:all .18s; }
  .hint-btn:hover { border-color:var(--accent-dim); color:var(--accent); }
  .submit-btn, .next-action-btn { flex:1; background:var(--accent); color:#fff; border:none; text-align:center; }
  .submit-btn:hover, .next-action-btn:hover { background:var(--accent-dim); }
  
  .feedback { display:none; padding:16px 20px; border-radius:4px; font-size:14px; line-height:1.7; margin-top:8px; }
  .feedback.visible { display:block; animation:fadeUp .3s ease; }
  .feedback.correct { background:rgba(42,120,72,0.06); border:1px solid rgba(42,120,72,0.3); color:var(--green); }
  .feedback.wrong { background:rgba(176,48,32,0.06); border:1px solid rgba(176,48,32,0.3); color:var(--red); }
  .feedback .answer-reveal { font-family:'Playfair Display', serif; font-size:17px; margin-top:6px; color:var(--text-dim); }

  @keyframes fadeUp { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .summary { text-align:center; width:100%; display:block; }
  .summary .big { font-family:'Playfair Display', serif; font-size:52px; color:var(--accent); margin-bottom:14px; }
  .summary h2 { font-size:18px; font-weight:400; color:var(--text-dim); margin-bottom:22px; }
  .summary-table { width:100%; text-align:left; border-collapse:collapse; margin-bottom:24px; }
  .summary-table th, .summary-table td { padding:9px 10px; border-bottom:1px solid var(--border); font-size:13px; }
  .summary-table th { color:var(--text-muted); font-weight:400; letter-spacing:0.05em; text-transform:uppercase; font-size:10px; }
  .lv-pill { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; }
  .lv-pill.up { background:rgba(42,120,72,0.08); color:var(--green); }
  .lv-pill.reset { background:rgba(176,48,32,0.08); color:var(--red); }
  .restart-btn { width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:4px; font-family:'Playfair Display', serif; font-size:15px; cursor:pointer; }
  .restart-btn:hover { background:var(--accent-dim); }

  .empty-note { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:13px; line-height:1.8; }

  button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

  @media (max-width: 540px) {
    header { padding: 20px 16px 0; }
    main { padding: 24px 16px 80px; }
    .progress-wrap { padding: 12px 16px 0; }
    .card { padding: 28px 20px 24px; }
    .jp-sentence, .fr-sentence { font-size: 19px; }
    .answer-input { font-size: 18px; padding: 14px 12px; }
    .action-row { flex-direction: column; gap: 10px; margin-bottom: 12px; }
    .hint-btn, .submit-btn, .next-action-btn { padding: 16px; font-size: 15px; width: 100%; }
    .day-info .big { font-size: 40px; }
    .start-btn { padding: 18px; font-size: 17px; }
    .quota-box .n { font-size: 26px; }
    .quota-note { font-size: 12px; }
    .summary .big { font-size: 40px; }
    .summary-table th, .summary-table td { font-size: 12px; padding: 8px 6px; }
    .restart-btn { padding: 16px; font-size: 15px; }
  }

  body { padding-bottom: env(safe-area-inset-bottom); }
</style>
</head>

let currentUtterance = null;
let fillProgress = {};
WORDS.forEach(w => { fillProgress[w.id] = { level:0, nextReview:0, introduced:false }; });

let dayNum = 1;
let order = [];
let idx = 0;
let hinted = false, answered = false;
let log = [];

const STORAGE_KEY = 'fr_fill_v2';

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ fillProgress, dayNum }));
  } catch(e) {}
}

function loadProgress() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!saved) return;
    if (saved.fillProgress) {
      WORDS.forEach(w => {
        if (saved.fillProgress[w.id]) fillProgress[w.id] = saved.fillProgress[w.id];
      });
    }
    if (saved.dayNum) dayNum = saved.dayNum;
  } catch(e) {}
}

loadProgress();

function normalize(s) {
  return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ');
}

function speak(text) {
  if (!window.speechSynthesis) return;
  try {
    speechSynthesis.cancel();
    currentUtterance = new SpeechSynthesisUtterance(text);
    currentUtterance.lang = 'fr-FR'; 
    currentUtterance.rate = 0.9;
    speechSynthesis.speak(currentUtterance);
  } catch(e) {}
}

function wordById(id) { return WORDS.find(w => w.id === id); }

function buildTodaySet() {
  const dueReviews = WORDS
    .filter(w => fillProgress[w.id].introduced && fillProgress[w.id].nextReview <= Date.now())
    .sort((a,b) => fillProgress[a.id].nextReview - fillProgress[b.id].nextReview)
    .slice(0, REVIEW_CAP)
    .map(w => w.id);

  const remainingSlots = Math.max(0, DAILY_TOTAL - dueReviews.length);
  const newWords = WORDS
    .filter(w => !fillProgress[w.id].introduced)
    .sort((a,b) => a.masterOrder - b.masterOrder)
    .slice(0, remainingSlots)
    .map(w => w.id);

  const combined = [...dueReviews, ...newWords];
  for (let i = combined.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [combined[i], combined[j]] = [combined[j], combined[i]];
  }
  return { queue: combined, reviewCount: dueReviews.length, newCount: newWords.length };
}

function renderDayInfo() {
  document.getElementById('day-num').textContent = dayNum;
  document.getElementById('progress-fill').style.width = '0%';
  const { queue, reviewCount, newCount } = buildTodaySet();
  order = queue; idx = 0; log = [];

  if (queue.length === 0) {
    const masteredCount = WORDS.filter(w => fillProgress[w.id].level >= LEVEL_DAYS.length).length;
    document.getElementById('main-area').innerHTML = `
      <div class="empty-note">
        🎉 本日の学習は完了しています！<br><br>
        復習単語がまだ期限に達していません。<br>
        明日またアプリを開いてください。<br><br>
        <span style="font-size:11px">習得済み：${masteredCount} / ${WORDS.length} 語</span>
      </div>
    `;
    return;
  }

  document.getElementById('main-area').innerHTML = `
    <div class="day-info">
      <div class="big">Day ${dayNum}</div>
      <h2>本日の学習予定</h2>
      <div class="quota-row">
        <div class="quota-box"><div class="n">${queue.length}</div><div class="l">合計</div></div>
        <div class="quota-box"><div class="n">${newCount}</div><div class="l">新規</div></div>
        <div class="quota-box"><div class="n">${reviewCount}</div><div class="l">復習</div></div>
      </div>
      <div class="quota-note">
        1日合計${DAILY_TOTAL}語・復習上限${REVIEW_CAP}語。<br>
        正解するごとにレベルが上がり、復習間隔が延びます。
      </div>
      <button class="start-btn" onclick="startQueue()">学習を始める</button>
    </div>
  `;
}

function startQueue() { idx = 0; render(); }

function render() {
  if (idx >= order.length) { renderDaySummary(); return; }
  const wid = order[idx];
  const w = wordById(wid);
  const prog = fillProgress[wid];
  hinted = false; answered = false;

  document.getElementById('progress-fill').style.width = (idx / order.length * 100) + '%';

  const blankRegex = new RegExp(w.blank.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
  const sentenceHtml = w.ex_fr.replace(blankRegex, '<span class="blank-slot">?????</span>');
  const isNew = !prog.introduced;
  const badgeClass = isNew ? 'new' : 'review';
  const badgeLabel = isNew ? '新規' : `復習 ・ Lv.${prog.level}`;

  document.getElementById('main-area').innerHTML = `
    <div class="level-badge ${badgeClass}">${badgeLabel} (${idx+1}/${order.length})</div>
    <div class="card">
      <div class="pos-tag">${w.pos}</div>
      <div class="jp-sentence">${w.ex_jp}</div>
      <div class="fr-sentence">${sentenceHtml}</div>
      
      <div class="input-row">
        <input type="text" class="answer-input" id="answer-input" placeholder="空欄に入る単語を入力" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      </div>
      <div class="hint-text" id="hint-text" style="display:none"></div>
      <div class="action-row" id="btn-container">
        <button class="hint-btn" id="hint-btn" onclick="showHint()">ヒントを見る</button>
        <button class="submit-btn" onclick="submitAnswer()">判定する</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  `;

  if (!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    document.getElementById('answer-input').focus();
  }
}

function showHint() {
  if (hinted) return;
  hinted = true;
  const w = wordById(order[idx]);
  document.getElementById('hint-text').style.display = 'block';
  document.getElementById('hint-text').textContent = `ヒント：${w.blank.charAt(0)}...（${w.blank.length}文字）`;
}

function submitAnswer() {
  if (answered) return;
  answered = true;
  const wid = order[idx];
  const w = wordById(wid);
  const prog = fillProgress[wid];
  const input = document.getElementById('answer-input');
  
  input.blur();

  const isCorrect = normalize(input.value) === normalize(w.blank);

  const before = prog.level;
  let after;
  if (isCorrect) {
    after = Math.min(before + 1, LEVEL_DAYS.length);
    prog.nextReview = Date.now() + (LEVEL_DAYS[before] || LEVEL_DAYS[LEVEL_DAYS.length-1]) * DAY_MS;
  } else {
    after = 0;
    prog.nextReview = Date.now() + LEVEL_DAYS[0] * DAY_MS;
    const reinsertPos = Math.min(idx + 10, order.length);
    order.splice(reinsertPos, 0, wid);
  }
  prog.level = after;
  prog.introduced = true;
  log.push({ fr: w.fr, before, after, correct: isCorrect });

  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.disabled = true;
  saveProgress();
  speak(w.ex_fr);

  const fb = document.getElementById('feedback');
  fb.classList.add('visible', isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = isCorrect
    ? `正解！ <div class="answer-reveal">${w.blank}</div>`
    : `不正解 — 正解は <div class="answer-reveal">${w.blank}</div><div style="font-size:11px;margin-top:8px;color:var(--text-muted)">約10問後に再出題されます</div>`;
  
  const container = document.getElementById('btn-container');
  container.innerHTML = `<button class="next-action-btn" onclick="nextWord()">次へ →</button>`;
}

function nextWord() { idx++; render(); }

function renderDaySummary() {
  document.getElementById('progress-fill').style.width = '100%';
  const correctCount = log.filter(l => l.correct).length;
  const masteredCount = WORDS.filter(w => fillProgress[w.id].level >= LEVEL_DAYS.length).length;
  document.getElementById('main-area').innerHTML = `
    <div class="card summary">
      <div class="big">✓</div>
      <h2>Day ${dayNum} 終了 ${correctCount} / ${log.length} 問正解</h2>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:20px">習得済み：${masteredCount} / ${WORDS.length} 語</div>
      <table class="summary-table">
        <tr><th>単語</th><th>結果</th><th>レベル変化</th></tr>
        ${log.map(l => `
          <tr>
            <td>${l.fr}</td>
            <td>${l.correct ? '<span style="color:var(--green)">○</span>' : '<span style="color:var(--red)">×</span>'}</td>
            <td><span class="lv-pill ${l.correct ? 'up' : 'reset'}">Lv.${l.before} → Lv.${l.after}</span></td>
          </tr>`).join('')}
      </table>
      <button class="restart-btn" onclick="goMenu()">メニューに戻る</button>
    </div>
  `;
}

function goMenu() {
  dayNum++;
  saveProgress();
  renderDayInfo();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (order[idx] === undefined) return;
    if (!answered) submitAnswer();
    else nextWord();
  }
});

renderDayInfo();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
